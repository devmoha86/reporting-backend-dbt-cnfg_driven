<svg viewBox="0 0 1340 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6472"/>
    </marker>
  </defs>

  <rect width="1340" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="670" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1b2733">Reporting Access — Decision Tree</text>

  <!-- ============ NODES ============ -->

  <!-- Start: Reporting Request -->
  <rect x="430" y="55" width="240" height="56" rx="10" fill="#1b2733"/>
  <text x="550" y="89" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">Reporting Request</text>

  <!-- Decision: User Type -->
  <polygon points="550,150 650,195 550,240 450,195" fill="#fff4dc" stroke="#d99a2b" stroke-width="2"/>
  <text x="550" y="191" text-anchor="middle" font-size="14" font-weight="600" fill="#5c3d05">User Type?</text>
  <text x="550" y="208" text-anchor="middle" font-size="14" font-weight="600" fill="#5c3d05"></text>

  <!-- External terminal: Custom Solution -->
  <rect x="90" y="280" width="270" height="78" rx="10" fill="#0f6f6a"/>
  <text x="225" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Custom Solution</text>
  <text x="225" y="330" text-anchor="middle" font-size="12.5" fill="#d8f3f1">Angular + FastAPI (SOLV)</text>
  <text x="225" y="347" text-anchor="middle" font-size="12.5" fill="#d8f3f1">all external users</text>

  <!-- Decision: SOX controlled -->
  <polygon points="870,260 980,310 870,360 760,310" fill="#fff4dc" stroke="#d99a2b" stroke-width="2"/>
  <text x="870" y="305" text-anchor="middle" font-size="14" font-weight="600" fill="#5c3d05">SOX Controlled</text>
  <text x="870" y="322" text-anchor="middle" font-size="14" font-weight="600" fill="#5c3d05">Report?</text>

  <!-- SOX-Yes terminal: Custom Solution (2nd instance) -->
  <rect x="560" y="430" width="270" height="78" rx="10" fill="#0f6f6a"/>
  <text x="695" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Custom Solution</text>
  <text x="695" y="480" text-anchor="middle" font-size="12.5" fill="#d8f3f1">Angular + FastAPI (SOLV)</text>
  <text x="695" y="497" text-anchor="middle" font-size="12.5" fill="#d8f3f1">SOX-controlled, internal</text>

  <!-- Decision: Reporting Need -->
  <polygon points="1000,420 1110,470 1000,520 890,470" fill="#fff4dc" stroke="#d99a2b" stroke-width="2"/>
  <text x="1000" y="465" text-anchor="middle" font-size="14" font-weight="600" fill="#5c3d05">Reporting Need?</text>
  <text x="1000" y="482" text-anchor="middle" font-size="11.5" fill="#7a5a16">(non-SOX, internal)</text>

  <!-- NLQ terminal -->
  <rect x="850" y="585" width="220" height="78" rx="10" fill="#5b3f96"/>
  <text x="960" y="616" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">NLQ</text>
  <text x="960" y="636" text-anchor="middle" font-size="12.5" fill="#e6deF7">Natural Language Query</text>
  <text x="960" y="652" text-anchor="middle" font-size="12.5" fill="#e6deF7">ad-hoc / read-only</text>

  <!-- Tableau terminal -->
  <rect x="1090" y="585" width="220" height="78" rx="10" fill="#1d6e3c"/>
  <text x="1200" y="611" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Tableau</text>
  <text x="1200" y="628" text-anchor="middle" font-size="12.5" fill="#d3efdc">Self-Serve</text>
  <text x="1200" y="645" text-anchor="middle" font-size="11.5" fill="#d3efdc">via SDL exposed data models</text>

  <!-- ============ EDGES ============ -->

  <!-- Request -> User Type -->
  <path d="M550,111 L550,148" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- User Type -> External -->
  <path d="M480,225 C 350,260 270,255 230,278" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="320" y="248" font-size="13" font-weight="600" fill="#3b4452">External</text>

  <!-- User Type -> SOX diamond -->
  <path d="M620,225 C 760,255 820,250 850,258" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="700" y="240" font-size="13" font-weight="600" fill="#3b4452">Internal</text>

  <!-- SOX -> Custom Solution (Yes) -->
  <path d="M820,338 C 760,400 740,410 720,428" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="715" y="395" font-size="13" font-weight="600" fill="#0f6f6a">Yes</text>

  <!-- SOX -> Reporting Need (No) -->
  <path d="M905,335 C 950,375 970,395 985,418" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="945" y="390" font-size="13" font-weight="600" fill="#3b4452">No</text>

  <!-- Reporting Need -> NLQ -->
  <path d="M965,495 C 950,535 950,560 958,583" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="838" y="555" font-size="12.5" font-weight="600" fill="#5b3f96">Ad-hoc / Read-only</text>

  <!-- Reporting Need -> Tableau -->
  <path d="M1045,495 C 1100,535 1150,560 1175,583" stroke="#5b6472" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="1070" y="555" font-size="12.5" font-weight="600" fill="#1d6e3c">Self-Serve Analytics</text>

  <!-- Legend -->
  <rect x="60" y="600" width="14" height="14" fill="#1b2733"/>
  <text x="80" y="611" font-size="12" fill="#3b4452">Start</text>
  <polygon points="60,635 67,628 74,635 67,642" fill="#fff4dc" stroke="#d99a2b" stroke-width="1.5"/>
  <text x="80" y="639" font-size="12" fill="#3b4452">Decision</text>
  <rect x="60" y="650" width="14" height="14" fill="#0f6f6a"/>
  <text x="80" y="661" font-size="12" fill="#3b4452">Custom Solution</text>
  <rect x="200" y="650" width="14" height="14" fill="#5b3f96"/>
  <text x="220" y="661" font-size="12" fill="#3b4452">NLQ</text>
  <rect x="280" y="650" width="14" height="14" fill="#1d6e3c"/>
  <text x="300" y="661" font-size="12" fill="#3b4452">Tableau</text>

</svg>
